name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cli-node-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node: [18, 22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          package-manager-cache: false
      - name: Install dependencies
        run: npm ci
      - name: Verify
        run: |
          npm run check
          npm test
          test "$(node bin/aisec.mjs --version)" = "$(node -p 'require("./package.json").version')"
          node -e 'const p=require("./package.json"); if (p.bin?.aisec !== "bin/aisec.mjs" || p.repository?.url !== "git+https://github.com/aisec-foundation/cli-node.git") process.exit(1)'
          npm audit --omit=dev --audit-level=high
          npm pack --dry-run --json >/dev/null
